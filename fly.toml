# fly.toml app configuration file generated for social-media-downloader-api on 2026-03-14T16:35:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'social-media-downloader-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  BACKUP_PATH = '/data/backups'
  CACHE_PATH = '/data/cache'
  CACHE_TTL_HOURS = '24'
  COOKIE_PATH = '/data/cookies'
  COOKIE_ROTATION_STRATEGY = 'weighted'
  CORS_ORIGIN = '*'
  DATA_PATH = '/data'
  DB_PATH = '/data/database.sqlite'
  ENABLE_RATE_LIMITING = 'true'
  ENABLE_REQUEST_LOGGING = 'true'
  LOG_LEVEL = 'info'
  LOG_PATH = '/data/logs'
  MAX_CACHE_SIZE_MB = '500'
  MAX_CONCURRENT_DOWNLOADS = '5'
  NODE_ENV = 'production'
  PORT = '3007'
  TEMP_PATH = '/data/temp'
  TEMP_RETENTION_HOURS = '1'

[[mounts]]
  source = 'social_media_data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3007
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

[checks]
  [checks.health]
    port = 3007
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[metrics]]
  port = 3007
  path = '/api/stats'
