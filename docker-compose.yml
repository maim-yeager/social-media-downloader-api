version: '3.8'

services:
  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATA_PATH=/data
      - COOKIE_PATH=/data/cookies
      - TEMP_PATH=/data/temp
      - CACHE_PATH=/data/cache
      - LOG_PATH=/data/logs
      - DB_PATH=/data/database.sqlite
      - BACKUP_PATH=/data/backups
      - API_KEY=maimbro@#097
      - ENABLE_RATE_LIMITING=false
      - ENABLE_REQUEST_LOGGING=true
      - LOG_LEVEL=debug
      - CORS_ORIGIN=*
      - MAX_CONCURRENT_DOWNLOADS=3
      - COOKIE_ROTATION_STRATEGY=weighted
    volumes:
      - ./data:/data
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
